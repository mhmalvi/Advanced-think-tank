services:
  att:
    build:
      context: ./ET
      dockerfile: Dockerfile
    container_name: att
    networks:
      - apps_web
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:80/"]
      interval: 30s
      timeout: 5s
      retries: 3

  oasis:
    build:
      context: ./ET/oasis-service
      dockerfile: Dockerfile
    container_name: oasis
    networks:
      - apps_web
    environment:
      - OASIS_ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OASIS_LLM_MODEL=claude-haiku-4-5-20251001
      - OASIS_SUPABASE_URL=${SUPABASE_URL}
      - OASIS_SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - OASIS_PINECONE_API_KEY=${PINECONE_API_KEY}
      - OASIS_MAX_AGENTS=50
      - OASIS_MAX_STEPS=3
    volumes:
      - oasis_data:/app/data
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1536M
          cpus: "1.5"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8100/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  oasis_data:

networks:
  apps_web:
    external: true
