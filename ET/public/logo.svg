<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 48" fill="none">
  <!-- Shield/hexagon mark with inner network graph -->
  <defs>
    <linearGradient id="mark-grad" x1="0" y1="0" x2="40" y2="44">
      <stop offset="0%" stop-color="#E30613"/>
      <stop offset="100%" stop-color="#b91c1c"/>
    </linearGradient>
  </defs>

  <!-- Hexagonal shield -->
  <path d="M20 2 L36 10 L36 28 L20 44 L4 28 L4 10 Z" fill="url(#mark-grad)" rx="2"/>

  <!-- Network nodes inside shield -->
  <circle cx="20" cy="16" r="3" fill="white"/>
  <circle cx="12" cy="26" r="2.2" fill="white" opacity="0.85"/>
  <circle cx="28" cy="26" r="2.2" fill="white" opacity="0.85"/>
  <circle cx="20" cy="34" r="1.8" fill="white" opacity="0.7"/>
  <circle cx="10" cy="16" r="1.5" fill="white" opacity="0.5"/>
  <circle cx="30" cy="16" r="1.5" fill="white" opacity="0.5"/>

  <!-- Network lines -->
  <line x1="20" y1="16" x2="12" y2="26" stroke="white" stroke-width="1" opacity="0.5"/>
  <line x1="20" y1="16" x2="28" y2="26" stroke="white" stroke-width="1" opacity="0.5"/>
  <line x1="12" y1="26" x2="28" y2="26" stroke="white" stroke-width="0.8" opacity="0.35"/>
  <line x1="12" y1="26" x2="20" y2="34" stroke="white" stroke-width="0.8" opacity="0.35"/>
  <line x1="28" y1="26" x2="20" y2="34" stroke="white" stroke-width="0.8" opacity="0.35"/>
  <line x1="20" y1="16" x2="10" y2="16" stroke="white" stroke-width="0.6" opacity="0.3"/>
  <line x1="20" y1="16" x2="30" y2="16" stroke="white" stroke-width="0.6" opacity="0.3"/>

  <!-- "Advanced Think Tank" -->
  <text x="50" y="20" font-family="Inter, -apple-system, system-ui, sans-serif" font-weight="700" font-size="15" fill="#1c1917" letter-spacing="-0.03em">
    Advanced Think Tank
  </text>

  <!-- "by Aethon" -->
  <text x="50" y="36" font-family="Inter, -apple-system, system-ui, sans-serif" font-weight="500" font-size="10.5" fill="#E30613" letter-spacing="0.04em">
    by Aethon Automation Solutions
  </text>
</svg>
